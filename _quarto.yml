project:
  type: website
  output-dir: _site
  render:
    - "**/*.qmd"
    - "**/*.md"
    - "!README.md"
    - "!AGENTS.md"
    - "!cases/**/corpus/**"
    - "!cases/**/status/**"
    - "!cases/**/config/**"
    - "!schemas/**"
    - "!prompts/**"
    - "!scripts/**"

website:
  title: "The Sacrifice Law Workbench"
  description: "A comparative research workbench for assessing evidentiary support for Koenigsberg's Law of Sacrifice"
  site-url: "https://ashitaka-emishi.github.io/sacrifice-law-workbench/"
  draft-mode: visible

  navbar:
    background: primary
    search: true
    left:
      - href: index.qmd
        text: Overview
      - href: cases/x-case/artifacts/qmd/x-case-overview.qmd
        text: Findings
      - href: case-selection.qmd
        text: Cases
      - text: Method
        menu:
          - href: methodology.qmd
            text: Core Methodology
          - href: model-reliability-methodology.qmd
            text: Multi-Model Stress Test
          - href: human-reliability-methodology.qmd
            text: Human Reliability Methodology
          - href: docs/reliability/human-reliability-completion-checklist.md
            text: Human Reliability Completion Gate
          - href: model-reliability-results.qmd
            text: Model Reliability Results
          - href: human-adjudication-results.qmd
            text: Human Adjudication Results
      - href: research-archive.qmd
        text: Research Archive
    right:
      - icon: github
        href: https://github.com/ashitaka-emishi/sacrifice-law-workbench
        aria-label: View project on GitHub

  sidebar:
    style: docked
    search: true
    contents:
      - href: index.qmd
        text: Overview
      - href: cases/x-case/artifacts/qmd/x-case-overview.qmd
        text: Findings
      - section: Cases
        contents:
          - href: case-selection.qmd
            text: All Cases
          - href: cases/am-rev/artifacts/qmd/case-overview.qmd
            text: American Revolution
          - href: cases/napoleon/artifacts/qmd/case-overview.qmd
            text: Napoleon
          - href: cases/fr-rev/artifacts/qmd/case-overview.qmd
            text: French Revolution
          - href: cases/wwi-britain/artifacts/qmd/case-overview.qmd
            text: British WWI
          - href: cases/lincoln/artifacts/qmd/case-overview.qmd
            text: Lincoln
          - href: cases/hitler/artifacts/qmd/case-overview.qmd
            text: Hitler
      - section: Method
        contents:
          - href: methodology.qmd
            text: Core Methodology
          - href: model-reliability-methodology.qmd
            text: Multi-Model Stress Test
          - href: human-reliability-methodology.qmd
            text: Human Reliability Methodology
          - href: docs/reliability/human-reliability-completion-checklist.md
            text: Human Reliability Completion Gate
          - href: model-reliability-results.qmd
            text: Model Reliability Results
          - href: human-adjudication-results.qmd
            text: Human Adjudication Results
      - href: starter-corpus-proposal.qmd
        text: Corpus and Sources
      - href: starter-cluster-proposal.qmd
        text: Metaphor Systems
      - href: research-archive.qmd
        text: Research Archive

format:
  html:
    theme: [cosmo, custom.scss]
    toc: true
    toc-depth: 2
    include-in-header:
      text: |
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Catamaran:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
