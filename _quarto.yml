project:
  type: website
  output-dir: _site
  render:
    - "**/*.qmd"
    - "**/*.md"
    - "!README.md"
    - "!AGENTS.md"
    - "!cases/**/corpus/**"
    - "!cases/**/status/**"
    - "!cases/**/config/**"
    - "!schemas/**"
    - "!prompts/**"
    - "!scripts/**"

website:
  title: "The Sacrifice Law Workbench"
  description: "A comparative research workbench for assessing evidentiary support for Koenigsberg's Law of Sacrifice"
  draft-mode: visible

  navbar:
    background: primary
    search: true
    left:
      - href: index.qmd
        text: Home
      - href: case-selection.qmd
